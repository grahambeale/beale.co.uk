<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graham Beale — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #E8E4DC;
    --cream: #E8E4DC;
    --muted: #888480;
    --rule: #3A3633;
    --amber: #E8960A;
    --error: #9e3a1a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #252220;
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }

  .gate {
    width: 100%;
    max-width: 440px;
    display: flex;
    flex-direction: column;
    gap: 0;
    animation: fadeUp 0.5s ease both;
  }

  .gate-eyebrow {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 2.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .gate-eyebrow::before {
    content: '';
    display: block;
    width: 1.5rem;
    height: 1px;
    background: var(--muted);
  }

  .gate-title {
    font-family: 'Inter', sans-serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -0.03em;
    color: var(--cream);
    margin-bottom: 0.5rem;
  }

  .gate-subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 3rem;
    line-height: 1.5;
  }

  .gate-form {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .gate-input-wrap {
    position: relative;
  }

  .gate-input {
    width: 100%;
    background: #2e2a26;
    border: 1px solid var(--rule);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 400;
    padding: 1rem 1.25rem;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.06em;
    -webkit-text-security: disc;
    text-security: disc;
  }

  .gate-input::placeholder {
    color: var(--muted);
    letter-spacing: 0.04em;
    -webkit-text-security: none;
    text-security: none;
  }

  .gate-input:focus { border-color: var(--amber); }
  .gate-input.error { border-color: var(--error); }

  .gate-button {
    background: var(--amber);
    border: none;
    color: #252220;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 1rem 1.25rem;
    cursor: pointer;
    transition: opacity 0.2s;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .gate-button:hover { opacity: 0.9; }

  .gate-error {
    font-size: 0.8rem;
    color: var(--error);
    display: none;
    padding-top: 0.25rem;
    letter-spacing: 0.02em;
  }

  .gate-error.visible { display: block; }

  .gate-footer {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid var(--rule);
    font-size: 0.75rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .gate-footer a {
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .gate-footer a:hover { color: var(--cream); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  .shake { animation: shake 0.4s ease; }
</style>
</head>
<body>

<div class="gate">
  <p class="gate-eyebrow">Graham Beale · Portfolio</p>
  <h1 class="gate-title">Case<br>Studies</h1>
  <p class="gate-subtitle">Password protected. If you have received this link as part of a job application, the password is included with your copy of the CV.</p>

  <div class="gate-form">
    <div class="gate-input-wrap">
      <input
        type="password"
        id="passwordInput"
        class="gate-input"
        placeholder="Enter password"
        autocomplete="current-password"
        autofocus
      >
    </div>
    <button class="gate-button" onclick="checkPassword()">
      <span>Enter portfolio</span>
      <span>&#8594;</span>
    </button>
    <p class="gate-error" id="errorMsg">Incorrect password. Please check your copy of the CV.</p>
  </div>

  <div class="gate-footer">
    <a href="mailto:graham@beale.co.uk">graham@beale.co.uk</a> &nbsp;&middot;&nbsp;
    <a href="https://linkedin.com/in/grahambeale" target="_blank">LinkedIn</a> &nbsp;&middot;&nbsp;
    Cheltenham, UK
  </div>
</div>

<script>
  const PASSWORD = 'believeinbetter';
  const SESSION_KEY = 'gb_portfolio_auth';

  // If already authenticated, go straight to portfolio
  if (sessionStorage.getItem(SESSION_KEY) === 'true') {
    window.location.href = 'index.html';
  }

  function checkPassword() {
    const input = document.getElementById('passwordInput');
    const error = document.getElementById('errorMsg');
    const form = document.querySelector('.gate-form');

    if (input.value.toLowerCase().trim() === PASSWORD) {
      sessionStorage.setItem(SESSION_KEY, 'true');
      window.location.href = 'index.html';
    } else {
      input.classList.add('error', 'shake');
      error.classList.add('visible');
      input.value = '';
      setTimeout(() => input.classList.remove('shake'), 400);
      input.focus();
    }
  }

  document.getElementById('passwordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });
</script>

</body>
</html>
